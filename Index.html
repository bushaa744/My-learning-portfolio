<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Survey Form</title>
</head>
<body>

  <h1 id="title">Survey Form</h1>

  <p id="description">
    Please fill out this survey form.
  </p>

  <form id="survey-form">

    <label id="name-label" for="name">Name</label><br>
    <input
      type="text"
      id="name"
      placeholder="Enter your name"
      required
    ><br><br>

    <label id="email-label" for="email">Email</label><br>
    <input
      type="email"
      id="email"
      placeholder="Enter your email"
      required
    ><br><br>

    <label id="number-label" for="number">Age</label><br>
    <input
      type="number"
      id="number"
      min="10"
      max="100"
      placeholder="Enter your age"
    ><br><br>

    <label for="dropdown">Select Your Role</label><br>
    <select id="dropdown">
      <option value="">Select one</option>
      <option value="student">Student</option>
      <option value="teacher">Teacher</option>
    </select>

    <br><br>

    <p>Gender</p>

    <input type="radio" id="male" name="gender" value="male">
    <label for="male">Male</label>

    <input type="radio" id="female" name="gender" value="female">
    <label for="female">Female</label>

    <br><br>

    <p>Select Skills</p>

    <input type="checkbox" value="html" id="html">
    <label for="html">HTML</label><br>

    <input type="checkbox" value="css" id="css">
    <label for="css">CSS</label><br>

    <input type="checkbox" value="javascript" id="javascript">
    <label for="javascript">JavaScript</label>

    <br><br>

    <label for="comments">Additional Comments</label><br>
    <textarea id="comments" rows="5" cols="30" placeholder="Write your comments here"></textarea>

    <br><br>

    <button id="submit" type="submit">
      Submit
    </button>

  </form>

</body>
